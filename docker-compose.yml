version: "3.8"

# Tax Authority RAG — Local Infrastructure
# Usage: docker compose up -d

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: tax-rag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage:z
    restart: unless-stopped

  redis:
    image: redis/redis-stack-server:latest
    container_name: tax-rag-redis
    ports:
      - "6380:6379"
    restart: unless-stopped
